spring.application.name=backend

# Railway provides PORT automatically.
# Local development falls back to port 8080.
server.port=${PORT:8080}


# =====================================================
# DATABASE CONFIGURATION
# =====================================================

# Railway will supply these values through environment variables.
# The fallback values allow local development with Docker/MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/fraudguard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fraudguard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fraudguard}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =====================================================
# JPA / HIBERNATE
# =====================================================

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false


# =====================================================
# AI SERVICE
# =====================================================

# Local fallback points to the locally running FastAPI service.
# Railway will override this with the deployed AI service URL.
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}


# =====================================================
# JWT SECURITY
# =====================================================

# Never place the real production JWT secret in this file.
# Railway will supply JWT_SECRET through environment variables.
jwt.secret=${JWT_SECRET:fraudguard-local-development-secret-change-before-production-2026-secure-key}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}


# =====================================================
# FRONTEND / CORS
# =====================================================

# Railway will override this after the Vercel frontend is deployed.
app.frontend.url=${FRONTEND_URL:http://localhost:5173}


# =====================================================
# EMAIL NOTIFICATION SETTINGS
# =====================================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

fraudguard.mail.from=${MAIL_USERNAME:}
fraudguard.mail.escalation-recipient=${FRAUDGUARD_ESCALATION_RECIPIENT:}


# =====================================================
# SMS NOTIFICATION SETTINGS - AFRICA'S TALKING
# =====================================================

africastalking.sms.enabled=${AFRICASTALKING_SMS_ENABLED:false}
africastalking.sms.base-url=${AFRICASTALKING_BASE_URL:https://api.sandbox.africastalking.com/version1/messaging}
africastalking.sms.username=${AFRICASTALKING_USERNAME:sandbox}
africastalking.sms.api-key=${AFRICASTALKING_API_KEY:}
africastalking.sms.recipient=${FRAUDGUARD_SMS_RECIPIENT:}
africastalking.sms.sender-id=${AFRICASTALKING_SENDER_ID:}