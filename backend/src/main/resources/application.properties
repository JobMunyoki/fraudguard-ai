spring.application.name=backend

server.port=8080

spring.datasource.url=jdbc:mysql://mysql:3306/fraudguard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=fraudguard
spring.datasource.password=fraudguard
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Email notification settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

fraudguard.mail.from=${MAIL_USERNAME:}
fraudguard.mail.escalation-recipient=${FRAUDGUARD_ESCALATION_RECIPIENT:}

# SMS notification settings - Africa's Talking
africastalking.sms.enabled=${AFRICASTALKING_SMS_ENABLED:false}
africastalking.sms.base-url=${AFRICASTALKING_BASE_URL:https://api.sandbox.africastalking.com/version1/messaging}
africastalking.sms.username=${AFRICASTALKING_USERNAME:sandbox}
africastalking.sms.api-key=${AFRICASTALKING_API_KEY:}
africastalking.sms.recipient=${FRAUDGUARD_SMS_RECIPIENT:}
africastalking.sms.sender-id=${AFRICASTALKING_SENDER_ID:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

jwt.secret=fraudguard-development-secret-key-change-before-production-2026
jwt.expiration-ms=86400000