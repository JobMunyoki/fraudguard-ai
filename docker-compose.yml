services:
  mysql:
    image: mysql:8.0
    container_name: fraudguard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fraudguard
      MYSQL_USER: fraudguard
      MYSQL_PASSWORD: fraudguard
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  ai-service:
    build:
      context: ./ai-service
    container_name: fraudguard-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: fraudguard-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fraudguard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: fraudguard
      SPRING_DATASOURCE_PASSWORD: fraudguard
      AI_SERVICE_URL: http://ai-service:8000

  frontend:
    build:
      context: ./frontend
    container_name: fraudguard-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  mysql_data: